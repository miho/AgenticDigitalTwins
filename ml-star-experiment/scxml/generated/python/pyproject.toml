[project]
name = "pipchannelstatemachine"
version = "1.0.0"
description = "SCXML state machine generated by SCXML-Gen"
requires-python = ">=3.10"
dependencies = [
    "dukpy>=0.3.0",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["scxmlgen*", "*"]
