<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VENUS Protocol Editor — Hamilton STAR Digital Twin</title>
  <style>
    :root {
      --bg: #0d1117; --bg-surface: #161b22; --bg-input: #1c2129;
      --text: #e6edf3; --text-muted: #8b949e; --text-secondary: #b1bac4;
      --accent: #4cc9f0; --accent-green: #22c55e; --accent-red: #ef4444;
      --border: #30363d; --border-subtle: #21262d;
      --radius: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }
    [data-theme="light"] {
      --bg: #f6f8fa; --bg-surface: #ffffff; --bg-input: #f0f2f5;
      --text: #1f2328; --text-muted: #656d76; --text-secondary: #424a53;
      --accent: #0969da; --accent-green: #16a34a; --accent-red: #dc2626;
      --border: #d0d7de; --border-subtle: #e0e3e8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header h1 span { color: var(--accent); }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-actions input { width: 200px; padding: 6px 10px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); font-size: 12px; font-family: var(--mono); }
    .btn { padding: 6px 14px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 600; transition: filter 0.15s; }
    .btn:hover { filter: brightness(1.15); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-success { background: var(--accent-green); color: #fff; }
    .btn-danger { background: var(--accent-red); color: #fff; }
    .btn-ghost { background: var(--bg-input); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-sm { padding: 4px 8px; font-size: 10px; }
    .theme-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-muted); cursor: pointer; font-size: 14px; }

    main { display: flex; height: calc(100vh - 49px); }

    /* Left: step palette + protocol */
    .panel-left { width: 400px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .panel-section { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); }
    .panel-section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }

    /* Step palette */
    .step-palette { display: flex; flex-wrap: wrap; gap: 4px; }
    .step-chip {
      padding: 4px 10px; font-size: 10px; border-radius: 12px;
      background: var(--bg-input); border: 1px solid var(--border-subtle);
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
      user-select: none;
    }
    .step-chip:hover { border-color: var(--accent); color: var(--accent); }
    .step-chip[data-cat="power"] { border-color: rgba(139, 92, 246, 0.3); }
    .step-chip[data-cat="power"]:hover { border-color: #8b5cf6; color: #8b5cf6; }
    .step-chip[data-cat="transport"] { border-color: rgba(234, 179, 8, 0.3); }
    .step-chip[data-cat="transport"]:hover { border-color: #eab308; color: #eab308; }
    .cat-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin: 6px 0 3px; width: 100%; }

    /* Protocol list */
    .proto-list { flex: 1; overflow-y: auto; padding: 8px; }
    .proto-list:empty::after { content: 'Click a step type above to add it'; display: block; text-align: center; color: var(--text-muted); font-size: 11px; padding: 30px 0; }

    .step-card {
      background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-left: 3px solid var(--border); border-radius: var(--radius);
      padding: 8px 10px; margin-bottom: 6px; font-size: 11px;
    }
    .step-card--running { border-left-color: var(--accent); }
    .step-card--success { border-left-color: var(--accent-green); }
    .step-card--error { border-left-color: var(--accent-red); }
    .step-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-title { font-weight: 600; flex: 1; }
    .step-actions { display: flex; gap: 3px; }
    .step-actions button { width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--border-subtle); background: var(--bg-input); color: var(--text-muted); cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }
    .step-actions button:hover { background: var(--bg); color: var(--text); }

    .step-params { display: flex; flex-wrap: wrap; gap: 4px 10px; }
    .step-param { display: flex; align-items: center; gap: 4px; }
    .step-param label { font-size: 9px; color: var(--text-muted); min-width: 40px; }
    .step-param input, .step-param select {
      font-size: 10px; padding: 3px 6px; background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text); border-radius: 4px; font-family: var(--mono); width: 80px;
    }
    .step-param select { width: auto; }
    .param-group { font-size: 8px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); width: 100%; margin-top: 3px; }

    .step-result { font-size: 9px; padding: 4px 0 0; margin-top: 4px; border-top: 1px solid var(--border-subtle); }
    .result-ok { color: var(--accent-green); font-weight: 700; }
    .result-err { color: var(--accent-red); font-weight: 700; }

    /* Run bar */
    .run-bar {
      padding: 10px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .run-status { font-size: 10px; color: var(--text-muted); flex: 1; text-align: right; }
    .speed-select {
      font-size: 10px; padding: 4px 6px; background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text); border-radius: 4px; font-family: var(--font); cursor: pointer;
    }

    /* Right: results + log */
    .panel-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .results-panel { flex: 1; overflow-y: auto; padding: 16px; }
    .results-panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }

    .result-entry { padding: 8px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius); margin-bottom: 6px; font-size: 10px; }
    .result-entry h3 { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
    .result-cmd { font-family: var(--mono); font-size: 9px; color: var(--text-muted); padding: 2px 0; word-break: break-all; }
    .result-assess { font-size: 9px; color: var(--accent); }

    .status-bar { padding: 8px 16px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); display: flex; gap: 16px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot--ok { background: var(--accent-green); }
    .status-dot--err { background: var(--accent-red); }
    .status-dot--idle { background: var(--text-muted); }

    /* ── FW Command display ──────────────────────────────────────────── */
    .fw-cmd {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 9px;
      background: var(--bg-input); border-radius: 3px;
      padding: 2px 6px; margin: 2px 0;
    }
    .fw-label {
      font-weight: 700; color: var(--accent);
      min-width: 36px; flex-shrink: 0;
    }
    .fw-cmd code {
      flex: 1; color: var(--text-secondary);
      word-break: break-all; white-space: pre-wrap;
    }
    .fw-result {
      font-size: 8px; font-weight: 700; text-transform: uppercase;
      padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
    }
    .fw-ok { background: rgba(34,197,94,0.15); color: var(--accent-green); }
    .fw-err { background: rgba(239,68,68,0.15); color: var(--accent-red); }

    /* ── Sub-step display ────────────────────────────────────────────── */
    .sub-steps { margin-top: 4px; }
    .sub-step {
      margin-left: 12px; padding: 4px 8px; margin-top: 3px;
      background: var(--bg-input); border-radius: 4px;
      border-left: 2px solid var(--border-subtle);
      font-size: 9px; color: var(--text-secondary);
    }
    .sub-step--active {
      border-left-color: var(--accent);
      animation: subPulse 1s ease-in-out infinite;
    }
    @keyframes subPulse {
      0%, 100% { background: var(--bg-input); }
      50% { background: rgba(76, 201, 240, 0.08); }
    }
    [data-theme="light"] .sub-step--active {
      animation-name: subPulseLight;
    }
    @keyframes subPulseLight {
      0%, 100% { background: var(--bg-input); }
      50% { background: rgba(9, 105, 218, 0.06); }
    }
    .sub-step-label {
      font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 5px; margin-bottom: 2px;
    }
    .sub-step-idx {
      font-size: 8px; font-weight: 700; color: var(--accent);
      background: rgba(76,201,240,0.1); border-radius: 2px;
      padding: 0 4px; min-width: 16px; text-align: center;
    }
    .sub-step--done .sub-step-idx { background: rgba(34,197,94,0.12); color: var(--accent-green); }
    .sub-step--failed .sub-step-idx { background: rgba(239,68,68,0.12); color: var(--accent-red); }
    .sub-step-spinner {
      display: inline-block; width: 10px; height: 10px;
      border: 1.5px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── JSON Protocol panel ─────────────────────────────────────────── */
    .json-panel {
      border-top: 1px solid var(--border);
      padding: 0;
    }
    .json-panel summary {
      padding: 8px 16px; cursor: pointer; font-size: 10px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-muted); user-select: none;
    }
    .json-panel summary:hover { color: var(--text); }
    .json-panel[open] summary { border-bottom: 1px solid var(--border-subtle); }
    .json-panel textarea {
      width: 100%; font-family: var(--mono); font-size: 10px;
      background: var(--bg-input); color: var(--text); border: none;
      padding: 8px 12px; resize: vertical; outline: none;
      border-bottom: 1px solid var(--border-subtle);
    }
    .json-panel textarea::placeholder { color: var(--text-muted); }
    .json-actions {
      display: flex; gap: 6px; padding: 8px 12px;
    }
    .json-actions button {
      padding: 4px 10px; font-size: 10px; font-weight: 600;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--bg-input); color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
    }
    .json-actions button:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Raw JSON params (for custom / unknown step types) ────────── */
    .step-raw-json {
      width: 100%; margin-top: 4px;
    }
    .step-raw-json textarea {
      width: 100%; font-family: var(--mono); font-size: 9px;
      background: var(--bg-input); color: var(--text); border: 1px solid var(--border);
      border-radius: 4px; padding: 4px 6px; resize: vertical; min-height: 40px;
    }
    .step-raw-json .raw-error { font-size: 8px; color: var(--accent-red); margin-top: 2px; }
  </style>
</head>
<body>
  <header>
    <h1><span>VENUS</span> Protocol Editor</h1>
    <div class="header-actions">
      <input type="text" id="server-url" value="http://localhost:8222" placeholder="Twin server URL">
      <button class="btn btn-ghost btn-sm" onclick="testConnection()">Test</button>
      <span id="conn-status" style="font-size:10px;color:var(--text-muted);">Not connected</span>
      <button class="theme-btn" onclick="toggleTheme()">&#9790;</button>
    </div>
  </header>

  <main>
    <div class="panel-left">
      <div class="panel-section">
        <h2>Add Steps</h2>
        <div class="step-palette" id="palette"></div>
      </div>
      <div class="proto-list" id="proto-list"></div>
      <div class="run-bar">
        <button class="btn btn-success" onclick="runAll()">Run All</button>
        <button class="btn btn-ghost btn-sm" onclick="clearAll()">Clear</button>
        <button class="btn btn-ghost btn-sm" onclick="initDevice()">Init All</button>
        <select id="exec-speed" class="speed-select">
          <option value="0">Instant</option>
          <option value="0.1">10x Speed</option>
          <option value="0.25">4x Speed</option>
          <option value="0.5" selected>2x Speed</option>
          <option value="1.0">Real-time</option>
          <option value="2.0">Half Speed</option>
          <option value="1000">Slow (1s)</option>
          <option value="2000">Very Slow (2s)</option>
        </select>
        <span class="run-status" id="run-status"></span>
      </div>

      <details class="json-panel">
        <summary>JSON Protocol</summary>
        <textarea id="json-editor" rows="8" placeholder='[{"type":"easyTransfer","params":{...}}]'></textarea>
        <div class="json-actions">
          <button onclick="importJSON()">Import</button>
          <button onclick="exportJSON()">Export</button>
          <button onclick="loadExample()">Load Example</button>
        </div>
      </details>
    </div>

    <div class="panel-right">
      <div class="results-panel" id="results">
        <h2>Execution Results</h2>
        <div id="result-entries"></div>
      </div>
      <div class="status-bar">
        <span><span class="status-dot status-dot--idle" id="conn-dot"></span>Server: <span id="server-label">disconnected</span></span>
        <span>Steps: <span id="step-count">0</span></span>
        <span>Commands sent: <span id="cmd-count">0</span></span>
      </div>
    </div>
  </main>

  <script>
    // ── Configuration ──────────────────────────────────────────────────
    let BASE = "http://localhost:8222";
    let totalCommands = 0;

    const STEPS = {
      pipetting: [
        { type: "easyTransfer", label: "Easy Transfer" },
        { type: "easyAspirate", label: "Easy Aspirate" },
        { type: "easyDispense", label: "Easy Dispense" },
        { type: "aspirate", label: "Aspirate" },
        { type: "dispense", label: "Dispense" },
        { type: "dispenseFly", label: "Dispense Fly" },

        { k: "aspiratePosition.carrierId", l: "Source", t: "carrier", d: "SMP001", g: "src" },
        { k: "aspiratePosition.position", l: "Pos", t: "num", d: 0, g: "src" },
        { k: "aspiratePosition.column", l: "Col", t: "num", d: 0, g: "src" },
        { k: "volume", l: "Vol (uL)", t: "num", d: 100 },
      ],
      easy96Dispense: [
        { k: "dispensePosition.carrierId", l: "Dest", t: "carrier", d: "DST001", g: "dest" },
        { k: "dispensePosition.position", l: "Pos", t: "num", d: 0, g: "dest" },
        { k: "dispensePosition.column", l: "Col", t: "num", d: 0, g: "dest" },
        { k: "ejectPosition.carrierId", l: "Eject", t: "carrier", d: "TIP001", g: "eject" },
        { k: "ejectPosition.position", l: "Pos", t: "num", d: 0, g: "eject" },
        { k: "ejectPosition.column", l: "Col", t: "num", d: 0, g: "eject" },
        { k: "volume", l: "Vol (uL)", t: "num", d: 100 },
      ],
      head96Move: [
        { k: "position.carrierId", l: "Carrier", t: "carrier", d: "SMP001" },
        { k: "position.position", l: "Pos", t: "num", d: 0 },
        { k: "position.column", l: "Col", t: "num", d: 0 },
      ],
      dispenseFly: [
        { k: "position.carrierId", l: "Carrier", t: "carrier", d: "DST001" },
        { k: "position.position", l: "Pos", t: "num", d: 0 },
        { k: "position.column", l: "Col", t: "num", d: 0 },
        { k: "volume", l: "Vol (uL)", t: "num", d: 10 },
        { k: "numDispenses", l: "# Disp", t: "num", d: 5 },
      ],
      getPlate: [
        { k: "position.carrierId", l: "Carrier", t: "carrier", d: "SMP001" },
        { k: "position.position", l: "Pos", t: "num", d: 0 },
        { k: "position.column", l: "Col", t: "num", d: 0 },
      ],
      putPlate: [
        { k: "position.carrierId", l: "Carrier", t: "carrier", d: "DST001" },
        { k: "position.position", l: "Pos", t: "num", d: 0 },
        { k: "position.column", l: "Col", t: "num", d: 0 },
      ],
    };

    let carriers = [];
    let steps = [];
    let stepId = 0;

    // ── API helpers ────────────────────────────────────────────────────
    async function api(path, body) {
      const opts = body ? { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) } : {};
      const r = await fetch(BASE + path, opts);
      return r.json();
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function testConnection() {
      BASE = document.getElementById("server-url").value.replace(/\/+$/, "");
      try {
        const state = await api("/state");
        carriers = state.deck?.carriers?.map(c => c.id) || [];
        document.getElementById("conn-status").textContent = "Connected (" + carriers.length + " carriers)";
        document.getElementById("conn-dot").className = "status-dot status-dot--ok";
        document.getElementById("server-label").textContent = BASE;
      } catch (e) {
        document.getElementById("conn-status").textContent = "Failed: " + e.message;
        document.getElementById("conn-dot").className = "status-dot status-dot--err";
      }
    }

    async function initDevice() {
      await api("/reset", {});
      for (const cmd of ["C0VIid9001", "C0DIid9002", "C0EIid9003", "C0FIid9004", "C0IIid9005"]) {
        await api("/command", { raw: cmd });
      }
      await sleep(2000);
      document.getElementById("run-status").textContent = "Device initialized";
    }

    // ── Nested object helpers ──────────────────────────────────────────
    function setNested(obj, path, val) {
      const parts = path.split(".");
      let cur = obj;
      for (let i = 0; i < parts.length - 1; i++) { if (!(parts[i] in cur)) cur[parts[i]] = {}; cur = cur[parts[i]]; }
      cur[parts[parts.length - 1]] = val;
    }
    function getNested(obj, path) {
      return path.split(".").reduce((c, p) => c?.[p], obj);
    }

    // ── Palette ────────────────────────────────────────────────────────
    function buildPalette() {
      const el = document.getElementById("palette");
      for (const [cat, items] of Object.entries(STEPS)) {
        const label = document.createElement("div");
        label.className = "cat-label";
        label.textContent = cat;
        el.appendChild(label);
        for (const item of items) {
          const chip = document.createElement("span");
          chip.className = "step-chip";
          chip.dataset.cat = cat;
          chip.textContent = item.label;
          chip.onclick = () => addStep(item.type, item.label);
          el.appendChild(chip);
        }
      }
    }

    // ── Step management ────────────────────────────────────────────────
    function addStep(type, label) {
      const params = {};
      for (const p of (PARAMS[type] || [])) setNested(params, p.k, p.d ?? "");
      steps.push({
        id: ++stepId, type, label, params,
        status: "pending", result: null,
        subSteps: null, subResults: [], currentSub: -1,
      });
      render();
    }

    function removeStep(id) { steps = steps.filter(s => s.id !== id); render(); }
    function moveStep(id, dir) {
      const i = steps.findIndex(s => s.id === id);
      const j = i + dir;
      if (j < 0 || j >= steps.length) return;
      [steps[i], steps[j]] = [steps[j], steps[i]];
      render();
    }

    async function runStep(id) {
      const step = steps.find(s => s.id === id);
      if (!step) return;
      const simSpeed = Number(document.getElementById("exec-speed").value);
      step.status = "running"; step.result = null; step.subSteps = null; step.subResults = []; step.currentSub = -1;
      render();

      try {
        // Try to decompose into sub-steps
        let decomp = null;
        try {
          decomp = await api("/step/decompose", { type: step.type, params: step.params });
        } catch (_) { /* decompose endpoint may not exist; fall through */ }

        const hasSubs = decomp && Array.isArray(decomp.subSteps) && decomp.subSteps.length > 0;

        if (hasSubs) {
          // -- Multi sub-step execution with server-side timing --
          step.subSteps = decomp.subSteps;
          render();

          for (let i = 0; i < step.subSteps.length; i++) {
            step.currentSub = i;
            render();
            const sub = step.subSteps[i];
            // Server delays the response based on simSpeed × estimated execution time
            const result = await api("/step", { type: sub.type, params: sub.params, simSpeed });
            step.subResults.push({ ...sub, result });
            totalCommands += result.commands?.length || 0;
            render(); renderResults();
            if (!result.success) {
              step.status = "error";
              step.result = { success: false, error: "Sub-step " + (i + 1) + " (" + (sub.label || sub.type) + ") failed: " + (result.error || "unknown") };
              step.currentSub = -1;
              render();
              return;
            }
          }
          step.status = "success";
          // Sum up timing from all sub-results
          const totalMs = step.subResults.reduce((s, r) => s + (r.result?.totalEstimatedTimeMs || 0), 0);
          step.result = { success: true, subStepCount: step.subSteps.length, totalEstimatedTimeMs: totalMs };
        } else {
          // -- Single step execution with server-side timing --
          step.result = await api("/step", { type: step.type, params: step.params, simSpeed });
          step.status = step.result.success ? "success" : "error";
          totalCommands += step.result.commands?.length || 0;
        }
      } catch (e) {
        step.result = { success: false, error: e.message };
        step.status = "error";
      }
      step.currentSub = -1;
      render(); renderResults();
    }

    async function runAll() {
      const status = document.getElementById("run-status");
      for (const s of steps) { s.status = "pending"; s.result = null; s.subSteps = null; s.subResults = []; s.currentSub = -1; }
      render();
      const t0 = Date.now();
      for (let i = 0; i < steps.length; i++) {
        status.textContent = "Running " + (i + 1) + "/" + steps.length + "...";
        await runStep(steps[i].id);
        if (steps[i].status === "error") { status.textContent = "Failed at step " + (i + 1); return; }
      }
      const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
      status.textContent = "All " + steps.length + " steps completed in " + elapsed + "s";
    }

    function clearAll() {
      steps = []; stepId = 0; totalCommands = 0;
      document.getElementById("run-status").textContent = "";
      document.getElementById("result-entries").innerHTML = "";
      render();
    }

    // ── FW Command rendering helper ────────────────────────────────────
    function renderFwCommands(commands) {
      if (!commands || commands.length === 0) return "";
      return commands.map(c => {
        const raw = c.raw || "";
        const label = raw.substring(0, 4);
        const accepted = c.result?.accepted !== false;
        const badge = accepted
          ? '<span class="fw-result fw-ok">OK</span>'
          : '<span class="fw-result fw-err">ERR ' + (c.result?.errorCode || "") + '</span>';
        const timing = c.estimatedTimeMs ? '<span style="color:var(--text-muted);font-size:8px;margin-left:4px;">' + (c.estimatedTimeMs / 1000).toFixed(1) + 's</span>' : '';
        return '<div class="fw-cmd"><span class="fw-label">' + escHtml(label) + '</span><code>' + escHtml(raw) + '</code>' + badge + timing + '</div>';
      }).join("");
    }

    function escHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Rendering ──────────────────────────────────────────────────────
    function render() {
      const list = document.getElementById("proto-list");
      list.innerHTML = "";
      document.getElementById("step-count").textContent = steps.length;
      document.getElementById("cmd-count").textContent = totalCommands;

      for (const step of steps) {
        const card = document.createElement("div");
        card.className = "step-card step-card--" + step.status;
        const idx = steps.indexOf(step) + 1;
        const isCustom = !PARAMS[step.type];

        let paramsHtml = "";
        if (isCustom) {
          // Unknown / custom step type: show raw JSON editor
          const jsonStr = JSON.stringify(step.params, null, 2);
          paramsHtml = '<div class="step-raw-json">'
            + '<div class="param-group">custom: ' + escHtml(step.type) + '</div>'
            + '<textarea onchange="updateRawParams(' + step.id + ', this)" rows="3">' + escHtml(jsonStr) + '</textarea>'
            + '<div class="raw-error" id="raw-err-' + step.id + '"></div></div>';
        } else {
          const defs = PARAMS[step.type] || [];
          let group = "";
          for (const p of defs) {
            if (p.g && p.g !== group) { group = p.g; paramsHtml += '<div class="param-group">' + p.g + '</div>'; }
            else if (!p.g && group) { group = ""; }
            const val = getNested(step.params, p.k) ?? p.d;
            if (p.t === "carrier") {
              const opts = (carriers.length ? carriers : ["TIP001","SMP001","DST001","RGT001","TIP002","WASH01","HHS001","TCC001"])
                .map(c => '<option ' + (c === val ? "selected" : "") + '>' + c + '</option>').join("");
              paramsHtml += '<div class="step-param"><label>' + p.l + '</label><select onchange="updateParam(' + step.id + ",'" + p.k + "'" + ',this.value)">' + opts + '</select></div>';
            } else {
              paramsHtml += '<div class="step-param"><label>' + p.l + '</label><input type="number" value="' + val + '" onchange="updateParam(' + step.id + ",'" + p.k + "'" + ',+this.value)"></div>';
            }
          }
        }

        // Sub-steps rendering
        let subHtml = "";
        if (step.subSteps && step.subSteps.length > 0) {
          subHtml = '<div class="sub-steps">';
          for (let si = 0; si < step.subSteps.length; si++) {
            const sub = step.subSteps[si];
            const subResult = step.subResults[si];
            const isActive = step.currentSub === si;
            const isDone = !!subResult;
            const isFailed = isDone && !subResult.result?.success;

            let cls = "sub-step";
            if (isActive) cls += " sub-step--active";
            if (isDone && !isFailed) cls += " sub-step--done";
            if (isFailed) cls += " sub-step--failed";

            subHtml += '<div class="' + cls + '">';
            subHtml += '<div class="sub-step-label">';
            subHtml += '<span class="sub-step-idx">' + (si + 1) + '</span>';
            subHtml += escHtml(sub.label || sub.type);
            if (isActive && !isDone) subHtml += ' <span class="sub-step-spinner"></span>';
            if (isDone && !isFailed) subHtml += ' <span class="result-ok">OK</span>';
            if (isFailed) subHtml += ' <span class="result-err">FAIL</span>';
            subHtml += '</div>';

            // Show FW commands inline for completed sub-steps
            if (subResult && subResult.result?.commands) {
              subHtml += renderFwCommands(subResult.result.commands);
            }
            subHtml += '</div>';
          }
          subHtml += '</div>';
        }

        // Result area
        let resultHtml = "";
        if (step.result) {
          if (step.result.success) {
            if (step.result.subStepCount) {
              resultHtml = '<div class="step-result"><span class="result-ok">OK</span> ' + step.result.subStepCount + ' sub-steps completed</div>';
            } else {
              const nc = step.result.commands?.length || 0;
              const na = step.result.assessments?.length || 0;
              resultHtml = '<div class="step-result"><span class="result-ok">OK</span> ' + nc + ' cmd' + (nc !== 1 ? "s" : "");
              if (na) resultHtml += ', ' + na + ' assessment' + (na !== 1 ? "s" : "");
              resultHtml += '</div>';
              // Show FW commands inline for single-step results
              resultHtml += renderFwCommands(step.result.commands);
            }
          } else {
            resultHtml = '<div class="step-result"><span class="result-err">FAIL</span> ' + escHtml(step.result.error || "?") + '</div>';
          }
        }

        card.innerHTML =
          '<div class="step-header">'
          + '<span class="step-num">' + idx + '</span>'
          + '<span class="step-title">' + escHtml(step.label) + '</span>'
          + '<span class="step-actions">'
          +   '<button onclick="moveStep(' + step.id + ',-1)">&uarr;</button>'
          +   '<button onclick="moveStep(' + step.id + ',1)">&darr;</button>'
          +   '<button onclick="runStep(' + step.id + ')">&#9654;</button>'
          +   '<button onclick="removeStep(' + step.id + ')">&times;</button>'
          + '</span>'
          + '</div>'
          + '<div class="step-params">' + paramsHtml + '</div>'
          + subHtml
          + resultHtml;
        list.appendChild(card);
      }
    }

    function renderResults() {
      const el = document.getElementById("result-entries");
      el.innerHTML = "";
      for (const step of steps) {
        // Handle steps with sub-results
        if (step.subResults && step.subResults.length > 0) {
          const entry = document.createElement("div");
          entry.className = "result-entry";
          let innerHtml = '<h3>' + escHtml(step.label) + ' -- '
            + (step.status === "success" ? '<span class="result-ok">OK</span>' : '<span class="result-err">FAIL</span>')
            + ' (' + step.subResults.length + ' sub-steps)</h3>';
          for (const sr of step.subResults) {
            innerHtml += '<div style="margin: 4px 0 2px; font-size:10px; font-weight:600;">'
              + escHtml(sr.label || sr.type)
              + (sr.result?.success ? ' <span class="result-ok">OK</span>' : ' <span class="result-err">FAIL</span>')
              + '</div>';
            innerHtml += renderFwCommands(sr.result?.commands);
            if (sr.result?.assessments) {
              innerHtml += sr.result.assessments.map(a =>
                '<div class="result-assess">' + escHtml(a.category) + ': ' + escHtml(a.description) + '</div>'
              ).join("");
            }
          }
          entry.innerHTML = innerHtml;
          el.appendChild(entry);
        } else if (step.result) {
          // Single step result (original rendering)
          const entry = document.createElement("div");
          entry.className = "result-entry";
          let cmdsHtml = renderFwCommands(step.result.commands);
          let assessHtml = (step.result.assessments || []).map(a =>
            '<div class="result-assess">' + escHtml(a.category) + ': ' + escHtml(a.description) + '</div>'
          ).join("");
          entry.innerHTML = '<h3>' + escHtml(step.label) + ' -- '
            + (step.result.success ? '<span class="result-ok">OK</span>' : '<span class="result-err">FAIL</span>')
            + '</h3>' + cmdsHtml + assessHtml;
          el.appendChild(entry);
        }
      }
    }

    function updateParam(id, key, val) {
      const step = steps.find(s => s.id === id);
      if (step) setNested(step.params, key, val);
    }

    function updateRawParams(id, textarea) {
      const step = steps.find(s => s.id === id);
      const errEl = document.getElementById("raw-err-" + id);
      if (!step) return;
      try {
        step.params = JSON.parse(textarea.value);
        if (errEl) errEl.textContent = "";
      } catch (e) {
        if (errEl) errEl.textContent = "Invalid JSON: " + e.message;
      }
    }

    function toggleTheme() {
      const t = document.documentElement.getAttribute("data-theme") === "light" ? "" : "light";
      document.documentElement.setAttribute("data-theme", t);
    }

    // ── JSON Import / Export ───────────────────────────────────────────
    function exportJSON() {
      const data = steps.map(s => ({ type: s.type, label: s.label, params: s.params }));
      document.getElementById("json-editor").value = JSON.stringify(data, null, 2);
    }

    function importJSON() {
      const ta = document.getElementById("json-editor");
      let data;
      try {
        data = JSON.parse(ta.value);
      } catch (e) {
        alert("Invalid JSON: " + e.message);
        return;
      }
      if (!Array.isArray(data)) { alert("Expected a JSON array of step definitions."); return; }
      for (const def of data) {
        if (!def.type) { alert("Each step must have a 'type' field."); return; }
        const label = def.label || def.type;
        const params = def.params || {};
        steps.push({
          id: ++stepId, type: def.type, label, params,
          status: "pending", result: null,
          subSteps: null, subResults: [], currentSub: -1,
        });
      }
      render();
    }

    function loadExample() {
      const example = [
        {
          type: "easyTransfer",
          label: "Transfer col 0",
          params: {
            tipPosition: { carrierId: "TIP001", position: 0, column: 0 },
            sourcePosition: { carrierId: "SMP001", position: 0, column: 0 },
            destPosition: { carrierId: "DST001", position: 0, column: 0 },
            volume: 100,
            channelMask: 255
          }
        },
        {
          type: "easyTransfer",
          label: "Transfer col 1",
          params: {
            tipPosition: { carrierId: "TIP001", position: 0, column: 1 },
            sourcePosition: { carrierId: "SMP001", position: 0, column: 1 },
            destPosition: { carrierId: "DST001", position: 0, column: 1 },
            volume: 100,
            channelMask: 255
          }
        },
        {
          type: "tipEject",
          label: "Eject tips",
          params: { channelMask: 255 }
        }
      ];
      document.getElementById("json-editor").value = JSON.stringify(example, null, 2);
    }

    // ── Init ───────────────────────────────────────────────────────────
    buildPalette();
    testConnection();
  </script>
